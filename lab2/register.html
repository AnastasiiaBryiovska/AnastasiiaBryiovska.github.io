<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Навчальні курси</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="icon" type="image/png" href="img/icon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

        <header>    
        <h1>Профіль</h1>
    </header>





        <div class="sign-up">


            <form action="#" class="sign-up-cont">
                <div class="container">
                    <h1>Реєстрація</h1>
                    <p>Будь ласка, заповніть цю форму, щоб створити обліковий запис.</p>

                    <hr>

                    <!-- required -->
                    <label for="Name">Name</label>
                    <input type="text" id="name" name="Ім'я" placeholder="Enter your name.." autocomplete="on">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="Електронна пошта" placeholder="Enter your email.." autocomplete="on">

                    <label for="psw">Password</label>
                    <input type="password" id="psw" name="Пароль" placeholder="Enter your password.." autocomplete="on">

                    <div class="btn btnR">
                        <button id="registerButton" type="button" class="btn btnR">Зареєструватися</button>
                    </div>
                </div>

            </form>

            <p id="message"> тут</p>

        </div>


        <div class="back-button">
        <a href="index.html">
            <img src="img/arrow.png" class="back-img">
        </a>
    </div>

        <script src="register.js"></script>
    </body>


    </head>
</html>
